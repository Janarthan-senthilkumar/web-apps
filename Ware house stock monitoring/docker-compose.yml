version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: warehouse-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: warehouse-server
    ports:
      - '5000:5000'
    environment:
      - MONGO_URI=mongodb://mongodb:27017/warehouse_stock_monitor
      - NODE_ENV=production
      - JWT_SECRET=change_this_in_production_2024
      - JWT_EXPIRE=7d
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - mongodb
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: warehouse-client
    ports:
      - '5173:80'
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongo-data:
